<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Energy AI Dashboard</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #22c55e;
            --accent: #f59e0b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 1100px; margin: auto; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 1px solid #334155;
            padding-bottom: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #334155;
            text-align: center;
        }

        .label { color: var(--text-dim); font-size: 0.75rem; text-transform: uppercase; font-weight: 700; margin-bottom: 10px; }
        .value { font-size: 1.8rem; font-weight: 700; }
        .unit { font-size: 0.9rem; color: var(--text-dim); margin-left: 4px; }

        .chart-section {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 15px;
        }

        .chart-card { background: var(--card-bg); padding: 20px; border-radius: 12px; height: 350px; }

        .ai-badge {
            background: rgba(245, 158, 11, 0.1);
            color: var(--accent);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            border: 1px solid var(--accent);
        }

        #confidence-bar-wrap {
            width: 100%; height: 6px; background: #334155; border-radius: 10px; margin-top: 10px; overflow: hidden;
        }
        #confidence-bar { height: 100%; width: 0%; background: var(--primary); transition: width 0.4s; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Energy Analytics System</h1>
        <div id="ai-status" class="ai-badge">System Ready</div>
    </header>

    <div class="grid">
        <div class="card">
            <div class="label">Real-Time Power</div>
            <div class="value"><span id="power-val">0</span><span class="unit">W</span></div>
        </div>

        <div class="card">
            <div class="label">Energy Used</div>
            <div class="value"><span id="kwh-val">0.0000</span><span class="unit">kWh</span></div>
        </div>

        <div class="card">
            <div class="label">Est. Cost (24p/kWh)</div>
            <div class="value"><span class="unit">£</span><span id="cost-val">0.00</span></div>
        </div>

        <div class="card">
            <div class="label">Power Factor</div>
            <div class="value" id="pf-val">0.98</div>
        </div>
    </div>

    <div class="chart-section">
        <div class="chart-card">
            <div class="label">Power Consumption History (Watts)</div>
            <canvas id="historyChart"></canvas>
        </div>

        <div class="card" style="display: flex; flex-direction: column; justify-content: center;">
            <div class="label">AI Device Recognition</div>
            <div class="value" id="device-label" style="color: var(--accent); margin-bottom: 10px;">Idle</div>
            <div class="label">Confidence: <span id="conf-text">0</span>%</div>
            <div id="confidence-bar-wrap"><div id="confidence-bar"></div></div>
        </div>
    </div>
</div>

<script>
    const socket = io();
    let totalKwh = 0;
    const COST_PER_KWH = 0.24;

    const ctx = document.getElementById('historyChart').getContext('2d');
    const historyChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [{
                data: [],
                borderColor: '#22c55e',
                backgroundColor: 'rgba(34, 197, 94, 0.1)',
                fill: true,
                tension: 0.4,
                pointRadius: 0
            }]
        },
        options: {
            maintainAspectRatio: false,
            scales: { 
                y: { beginAtZero: true, grid: { color: '#334155' } },
                x: { grid: { display: false } }
            },
            plugins: { legend: { display: false } }
        }
    });

    socket.on('new_data', (data) => {
        // 1. Basic Metrics
        const current = data.value; // Amps
        const voltage = 230; // Assuming UK Standard
        const pf = 0.95 + (Math.random() * 0.04); // Simulated PF for visual
        const watts = current * voltage * pf;

        document.getElementById('power-val').innerText = Math.round(watts);
        document.getElementById('pf-val').innerText = pf.toFixed(2);

        // 2. Accumulate Energy (kWh)
        // Calculated every 1 second: Watts / 3600 seconds / 1000 W/kW
        totalKwh += (watts / 3600 / 1000);
        document.getElementById('kwh-val').innerText = totalKwh.toFixed(5);
        document.getElementById('cost-val').innerText = (totalKwh * COST_PER_KWH).toFixed(2);

        // 3. AI Update
        document.getElementById('device-label').innerText = data.device.toUpperCase();
        let conf = Math.round(data.confidence * 100);
        document.getElementById('conf-text').innerText = conf;
        document.getElementById('confidence-bar').style.width = conf + '%';

        // 4. History Chart
        const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        if (historyChart.data.labels.length > 20) {
            historyChart.data.labels.shift();
            historyChart.data.datasets[0].data.shift();
        }
        historyChart.data.labels.push(now);
        historyChart.data.datasets[0].data.push(watts);
        historyChart.update('none');
    });
</script>
</body>
</html>
