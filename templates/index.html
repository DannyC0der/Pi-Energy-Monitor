<!DOCTYPE html>
<html>
<head>
    <title>Zoomed Real-Time Monitor</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div style="width: 90%; margin: auto; padding-top: 50px;">
        <h1 style="font-family: sans-serif;">Monitor Status: <span id="status" style="color: red;">Disconnected</span></h1>
        <canvas id="liveChart"></canvas>
    </div>

    <script>
        const statusText = document.getElementById('status');
        const ctx = document.getElementById('liveChart').getContext('2d');
        
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Current (Amps)',
                    data: [],
                    borderColor: '#2ecc71',
                    fill: true,
                    tension: 0.3
                }]
            },
            options: {
                scales: {
                    y: { min: 0, max: 0.2, ticks: { stepSize: 0.01 } }
                },
                animation: false
            }
        });

        // Use the IP address of your Pi directly to avoid "localhost" confusion
        const socket = io(); 

        socket.on('connect', () => {
            statusText.innerText = "Connected";
            statusText.style.color = "green";
            console.log("Connected to Pi!");
        });

        socket.on('new_data', function(msg) {
            console.log("Data received:", msg.value);
            let now = new Date().toLocaleTimeString();
            
            if (chart.data.labels.length > 20) {
                chart.data.labels.shift();
                chart.data.datasets[0].data.shift();
            }
            
            chart.data.labels.push(now);
            chart.data.datasets[0].data.push(msg.value);
            chart.update();
        });

        socket.on('disconnect', () => {
            statusText.innerText = "Disconnected";
            statusText.style.color = "red";
        });
    </script>
</body>
</html>
