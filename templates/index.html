<!DOCTYPE html>
<html>
<head>
    <title>Zoomed Real-Time Monitor</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div style="width: 90%; margin: auto; padding-top: 50px;">
        <h1 style="font-family: sans-serif; margin-bottom: 5px;">
            Monitor Status: <span id="status" style="color: red;">Disconnected</span>
        </h1>
        
        <div style="margin-bottom: 20px;">
            <h2 style="font-family: sans-serif; color: #2c3e50;">
                Detected Device: <span id="device-label" style="color: #e67e22;">Analyzing...</span>
            </h2>
        </div>

        <canvas id="liveChart"></canvas>
    </div>

    <script>
        const statusText = document.getElementById('status');
        const deviceLabel = document.getElementById('device-label');
        const ctx = document.getElementById('liveChart').getContext('2d');
        
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Current (Amps)',
                    data: [],
                    borderColor: '#2ecc71',
                    backgroundColor: 'rgba(46, 204, 113, 0.1)',
                    fill: true,
                    tension: 0.3,
                    pointRadius: 4
                }]
            },
            options: {
                responsive: true,
                scales: {
                    x: { 
                        display: true, 
                        title: { display: true, text: 'Time' } 
                    },
                    y: { 
                        min: 0, 
                        max: 0.2, 
                        ticks: { 
                            stepSize: 0.01,
                            callback: function(value) { return value.toFixed(2) + ' A'; }
                        },
                        title: { display: true, text: 'Amps' }
                    }
                },
                animation: false
            }
        });

        // Initialize Socket.IO
        const socket = io(); 

        socket.on('connect', () => {
            statusText.innerText = "Connected";
            statusText.style.color = "green";
            console.log("Connected to Pi!");
        });

        socket.on('new_data', function(msg) {
            console.log("Data received:", msg);
            let now = new Date().toLocaleTimeString();
            
            // 1. Update the ML Prediction Label
            if (msg.device) {
                deviceLabel.innerText = msg.device.toUpperCase();
            } else {
                deviceLabel.innerText = "Unknown";
            }

            // 2. Update the Chart Data
            if (chart.data.labels.length > 20) {
                chart.data.labels.shift();
                chart.data.datasets[0].data.shift();
            }
            
            chart.data.labels.push(now);
            chart.data.datasets[0].data.push(msg.value);
            chart.update();
        });

        socket.on('disconnect', () => {
            statusText.innerText = "Disconnected";
            statusText.style.color = "red";
            deviceLabel.innerText = "Offline";
        });
    </script>
</body>
</html>
